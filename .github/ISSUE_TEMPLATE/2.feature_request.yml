name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and why? Phrase it as "As a … I want … so that …".
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have thought about.
  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this touch?
      multiple: true
      options:
        - UI (browser)
        - Route Handler / BFF
        - core package
        - AKB integration
        - LLM / OpenRouter
        - Reports / analytics
        - Not sure
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, or anything else that helps.
  - type: checkboxes
    id: checks
    attributes:
      label: Validations
      options:
        - label: I searched existing issues and discussions and this is not a duplicate.
          required: true
        - label: I'm willing to submit a pull request for this feature.
          required: false
