apiVersion: apps/v1
kind: Deployment
metadata:
  name: reef-web
spec:
  # Single replica — reef-web is stateless (FR48) but traffic is flat
  # (TanStack Query polling, no spiky load), so one pod suffices.
  replicas: 1
  selector:
    matchLabels:
      app: reef-web
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: reef-web
    spec:
      # SSE drain: /api/agents/runs chat streams can run long. preStop holds
      # the pod open so in-flight streams finish before SIGTERM; the grace
      # period is the hard ceiling.
      terminationGracePeriodSeconds: 90
      securityContext:
        runAsNonRoot: true
      initContainers:
        - name: reef-schema-migration
          image: reef-web:latest
          imagePullPolicy: Always
          command: ["node", "/app/schema-migrator/cli.mjs"]
          env:
            - name: AKB_BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: reef-web-config
                  key: AKB_BACKEND_URL
            - name: REEF_AKB_MIGRATION_SERVICE_ACCOUNT
              valueFrom:
                configMapKeyRef:
                  name: reef-web-config
                  key: REEF_AKB_MIGRATION_SERVICE_ACCOUNT
            - name: REEF_AKB_MIGRATION_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: reef-migration-secret
                  key: REEF_AKB_MIGRATION_SERVICE_KEY
          securityContext:
            allowPrivilegeEscalation: false
      containers:
        - name: reef-web
          image: reef-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: reef-web-config
            - secretRef:
                name: reef-web-secret
                # GitHub and LLM capabilities are optional. Deployments that
                # only use AKB/Keycloak do not need an otherwise empty Secret.
                optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "10"]
          securityContext:
            allowPrivilegeEscalation: false
