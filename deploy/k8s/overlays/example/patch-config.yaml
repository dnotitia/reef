# Overrides the base reef-web-config ConfigMap. Only the keys that differ
# per deployment are listed here; the rest (for example NODE_ENV)
# come from the base and rarely change.
apiVersion: v1
kind: ConfigMap
metadata:
  name: reef-web-config
data:
  # In-cluster DNS of the akb backend reef-web talks to. Replace
  # `example` with the namespace akb runs in (and adjust the Service name
  # if yours differs), e.g. http://backend.<akb-namespace>.svc.cluster.local:8000.
  AKB_BACKEND_URL: "http://akb-backend.example.svc.cluster.local:8000"
  # reef-web's canonical public origin. Must match the ingress host below.
  REEF_PUBLIC_ORIGIN: "https://reef.example.com"
